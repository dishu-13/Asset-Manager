name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project (expo prebuild)
        working-directory: artifacts/mobile
        env:
          EXPO_PUBLIC_API_URL: https://0a00d7e7-ca43-4c1a-9b12-660411172c3f-00-1cqnmdcrgrsvh.picard.replit.dev
        run: |
          echo "EXPO_PUBLIC_API_URL=https://0a00d7e7-ca43-4c1a-9b12-660411172c3f-00-1cqnmdcrgrsvh.picard.replit.dev" >> .env
          pnpm exec expo prebuild --platform android --no-install --non-interactive

      - name: Ensure gradlew is executable
        run: chmod +x artifacts/mobile/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/mobile/android
        env:
          EXPO_PUBLIC_API_URL: https://0a00d7e7-ca43-4c1a-9b12-660411172c3f-00-1cqnmdcrgrsvh.picard.replit.dev
        run: ./gradlew assembleDebug -x lint

      - name: Rename APK
        run: |
          mkdir -p dist
          cp artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             dist/AutoHire-AI.apk

      - name: Get version tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AutoHire AI ${{ steps.version.outputs.tag }}"
          body: |
            ## AutoHire AI — Android APK

            ### Install on Android
            1. Download **AutoHire-AI.apk** below
            2. On your Android device, go to **Settings → Security** and enable **Install from unknown sources** (or "Install unknown apps")
            3. Open the downloaded APK and tap **Install**

            ### What's in this build
            - Live job listings from Greenhouse, Remotive, and more
            - AI resume tailoring
            - ATS score checker
            - Application tracker
          files: dist/AutoHire-AI.apk
          draft: false
          prerelease: false
