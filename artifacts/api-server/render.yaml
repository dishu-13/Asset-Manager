services:
  - type: web
    name: autohire-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: ADZUNA_APP_ID
        scope: build
      - key: ADZUNA_APP_KEY
        scope: build
    healthCheckPath: /api/health
    routes:
      - path: /api
        destination: /
    maxNumProcesses: 1
